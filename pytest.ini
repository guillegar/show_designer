[pytest]
# Show Designer Pro — configuración de pytest

# Directorio de tests
testpaths = tests

# Salida detallada con info de fallo
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Marcadores personalizados (evita warnings de marcadores no declarados)
markers =
    slow: tests que tardan >2s (ej. carga de audio real)
    integration: tests que requieren hardware o red
    ui: tests de UI (no se ejecutan en CI headless)
