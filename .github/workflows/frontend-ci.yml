name: frontend-ci

# Compila (TypeScript + Vite) y testea (Vitest) el frontend en cada push/PR que
# toque web/. La suite de Python se ejecuta localmente (deps de audio pesadas).

on:
  push:
    paths:
      - "web/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests (Vitest)
        run: npx vitest run
      - name: Type-check + production build
        run: npm run build
